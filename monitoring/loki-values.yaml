deploymentMode: SingleBinary

loki: 
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources: 
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits: 
      cpu: "500m"
      memory: "512Mi"

# chunksCache and resultsCache are enabled by default but consume significant memory
# they cause Pods to stay Pending on small clusters like minikube.
chunksCache:
  enabled: false

resultsCache:
  enabled: false

gateway:
  enabled: false

minio:
  enabled: false

# Explicitly set scalable mode replicas to 0 - 
# latest chart verions enable these by default, 
# which conflicts with SingleBinary mode.
backend: 
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0


monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  serviceMonitor:
    enabled: false

